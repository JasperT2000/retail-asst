app = "retail-ai-backend"
primary_region = "syd"

[build]
  dockerfile = "backend/Dockerfile"
  ignorefile = ".dockerignore"

[env]
  APP_ENV = "production"
  CONFIDENCE_THRESHOLD = "0.65"
  LANGFUSE_HOST = "https://cloud.langfuse.com"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/health"
    port = 8000
    timeout = "5s"
    type = "http"
