name: CI — Lint, Type Check & Eval

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-backend:
    name: Backend — lint & import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-prod.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-prod.txt ruff

      - name: Lint with ruff
        run: ruff check backend/ --ignore E501,E402 --exclude backend/smoke_test.py

      - name: Smoke test — import check
        run: python -c "from backend.main import app; print('Import OK')"
        env:
          NEO4J_URI: neo4j+s://placeholder.databases.neo4j.io
          NEO4J_USERNAME: placeholder
          NEO4J_PASSWORD: placeholder
          GROQ_API_KEY: placeholder
          OPENAI_API_KEY: placeholder
          LANGFUSE_PUBLIC_KEY: placeholder
          LANGFUSE_SECRET_KEY: placeholder

  lint-frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://retail-ai-backend.fly.dev

  eval:
    name: RAG Evaluation (graph_rag config)
    runs-on: ubuntu-latest
    needs: [lint-backend]
    if: github.event_name == 'pull_request'
    env:
      NEO4J_URI: ${{ secrets.NEO4J_URI }}
      NEO4J_USERNAME: ${{ secrets.NEO4J_USERNAME }}
      NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_ONLY: "1"
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements-prod.txt ragas datasets langchain-openai

      - name: Run graph_rag eval (25 questions, 2 metrics)
        run: python -m backend.eval.benchmark --config graph_rag --metrics faithfulness answer_relevancy

      - name: Check faithfulness threshold
        run: |
          python - <<'EOF'
          import json, glob, sys
          results = sorted(glob.glob("backend/eval/results/graph_rag_*.json"))
          if not results:
              print("No eval results found — skipping threshold check")
              sys.exit(0)
          with open(results[-1]) as f:
              data = json.load(f)
          faithfulness = data["metrics"].get("faithfulness", 0)
          print(f"Faithfulness: {faithfulness:.3f}")
          if faithfulness < 0.75:
              print(f"FAIL: faithfulness {faithfulness:.3f} dropped below 0.75")
              sys.exit(1)
          print("PASS")
          EOF

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: backend/eval/results/
