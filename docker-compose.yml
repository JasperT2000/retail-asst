# Neo4j Community Edition for local development
# Production uses Neo4j AuraDB Free (neo4j.com/cloud/aura)
#
# Usage:
#   docker compose up -d          # start Neo4j in background
#   docker compose down           # stop and remove containers
#   docker compose down -v        # stop and delete all data volumes
#
# Neo4j Browser:  http://localhost:7474  (login: neo4j / devpassword)
# Bolt port:      localhost:7687

services:
  neo4j:
    image: neo4j:5.18-community
    container_name: retail_ai_neo4j
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/devpassword
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      # Enable vector index support (included in Neo4j 5.x community)
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "wget", "-O", "-", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
